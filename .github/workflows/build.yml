name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version matches tag
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $pkg) { throw "Tag v$tag != package.json version $pkg" }

      - name: Build renderer
        run: npm run build
        env:
          VITE_TENCENT_SDK_APP_ID: ${{ secrets.VITE_TENCENT_SDK_APP_ID }}

      - name: Build main
        run: npm run build:main
        env:
          TENCENT_SDK_APP_ID: ${{ secrets.VITE_TENCENT_SDK_APP_ID }}
          USER_SIG_CLOUD_FUNCTION_URL: ${{ secrets.USER_SIG_CLOUD_FUNCTION_URL }}

      - name: Clean release directory
        run: if (Test-Path release) { Remove-Item -Recurse -Force release }

      - name: Build electron
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: Get-ChildItem -Path release -Recurse | Select-Object Name, Length
